<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <script src="./javascript/script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="content">
        <p id="display">0</p>
        <div id="buttons">
            <div>
            <div>
                <button>-</button>
                <button>*</button>
                <button>/</button>
            </div>
            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
            </div>
            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
            </div>
            <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
            </div>
            <div>
                <button class="zero">0</button>
                <button id="clear">C</button>
            </div>
            </div>
            <div class="plus-and-equal">
                <button class="plus">+</button>
                <button class="equal">=</button>
                <button class="floating-numbers">.</button>
            </div>
        </div>
    </div>
</body>
</html>
